<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delphi — Daily Briefs</title>
<link rel="icon" type="image/png" href="assets/shl-logo.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="mode-web layout-cards">

  <header class="topbar">
    <div class="brand">
      <img src="assets/shl-logo.png" alt="SHL" class="brand-logo" />
      <span class="brand-name">Delphi</span>
    </div>

    <div class="toggle-group">
      <div class="view-toggle" id="layoutToggle" data-active="cards" role="group" aria-label="Interface style">
        <span class="toggle-knob" aria-hidden="true"></span>
        <button type="button" class="toggle-option" data-value="cards" aria-pressed="true">Cards</button>
        <button type="button" class="toggle-option" data-value="headlines" aria-pressed="false">Headlines</button>
      </div>

      <div class="view-toggle" id="deviceToggle" data-active="web" role="group" aria-label="Display mode">
        <span class="toggle-knob" aria-hidden="true"></span>
        <button type="button" class="toggle-option" data-value="web" aria-pressed="true">Web</button>
        <button type="button" class="toggle-option" data-value="mobile" aria-pressed="false">Mobile</button>
      </div>

      <button type="button" class="generate-btn" id="generateBtn">+ Generate hypothesis</button>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="device" id="device">

      <div class="phone-chrome" aria-hidden="true">
        <span class="phone-notch"></span>
      </div>

      <div class="app-shell">
        <div class="app-topbar">
          <img src="assets/shl-logo.png" alt="SHL" class="app-topbar-logo" />
          <span class="app-topbar-name">Delphi</span>
        </div>

        <div class="progress-track" id="progressTrack"></div>

        <div class="card-viewport" id="cardViewport" tabindex="0" aria-label="Story cards"></div>

        <button type="button" class="nav-btn" id="nextBtn" aria-label="Next story">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="headline-list" id="headlineList" aria-label="Story headlines"></div>

      </div>

    </div>
  </main>

  <!-- Delphi Bot — web-only search assistant for existing hypotheses.
       Lives outside .app-shell so layout-cards/headlines rules never hide it. -->
  <div id="delphiBot" class="db-collapsed" aria-live="polite">
    <button type="button" id="dbLauncher" class="db-launcher" aria-label="Open Delphi Bot">
      <span class="db-launcher-dot" aria-hidden="true"></span>
      <span class="db-launcher-text">
        <span class="db-launcher-title">Delphi Bot</span>
        <span class="db-launcher-sub">Ask about existing hypotheses</span>
      </span>
    </button>

    <section class="db-panel" role="dialog" aria-label="Delphi Bot">
      <header class="db-header">
        <div class="db-header-titles">
          <span class="db-title">Delphi Bot</span>
          <span class="db-subtitle">Finds existing hypotheses</span>
        </div>
        <button type="button" id="dbMinimize" class="db-icon-btn" aria-label="Minimize">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
      </header>

      <div id="dbMessages" class="db-messages"></div>

      <form id="dbForm" class="db-input-row" autocomplete="off">
        <input id="dbInput" class="db-input" type="text" placeholder="Ask about a hypothesis…" aria-label="Message" />
        <button type="submit" id="dbSend" class="db-send" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>

      <button type="button" id="dbHide" class="db-hide">Hide assistant</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
