<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Delphi — Daily Briefs</title>
<link rel="icon" type="image/png" href="assets/shl-logo.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="mode-web">

  <header class="topbar">
    <div class="brand">
      <img src="assets/shl-logo.png" alt="SHL" class="brand-logo" />
      <span class="brand-name">Delphi</span>
    </div>

    <div class="view-toggle" id="viewToggle" data-active="web" role="group" aria-label="Display mode">
      <span class="toggle-knob" aria-hidden="true"></span>
      <button type="button" class="toggle-option" data-mode="web" aria-pressed="true">Web</button>
      <button type="button" class="toggle-option" data-mode="mobile" aria-pressed="false">Mobile</button>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="device" id="device">

      <div class="phone-chrome" aria-hidden="true">
        <span class="phone-notch"></span>
      </div>

      <div class="app-shell">
        <div class="progress-track" id="progressTrack"></div>

        <div class="card-viewport" id="cardViewport" tabindex="0" aria-label="Story cards"></div>

        <button type="button" class="nav-btn" id="nextBtn" aria-label="Next story">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
