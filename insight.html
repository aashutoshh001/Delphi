<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Delphi — Insight Report</title>
<link rel="icon" type="image/png" href="assets/shl-logo.png" />
<style>
  :root { --green: #78D64B; --green-dark: #56b52d; --grey: #4A4A4A; --border: #e6e6e6; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2.5rem 1.5rem 5rem; background: #fafafa; color: var(--grey);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.55;
  }
  main { max-width: 860px; margin: 0 auto; }
  a.back { font-size: 0.85rem; color: var(--grey); text-decoration: none; }
  a.back:hover { text-decoration: underline; }
  .lens-tag {
    display: inline-block; background: var(--green); color: #fff;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.03em;
    text-transform: uppercase; padding: 0.25rem 0.6rem; border-radius: 999px;
    margin: 1rem 0 0.8rem;
  }
  h1 { font-size: 1.85rem; line-height: 1.3; margin: 0 0 0.6rem; color: #191919; font-weight: 750; }
  .subtitle { font-size: 1.08rem; color: #444; margin: 0 0 1rem; font-weight: 500; }
  .meta { font-size: 0.85rem; color: #888; margin-bottom: 2rem; }
  h2 {
    font-size: 1.15rem; margin: 2.5rem 0 0.9rem; color: #191919;
    border-bottom: 2px solid var(--border); padding-bottom: 0.4rem;
  }
  h3 { font-size: 0.92rem; margin: 1.1rem 0 0.4rem; color: #222; }
  .card {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.2rem; margin-bottom: 0.8rem;
  }
  .statement {
    background: #fff; border: 1px solid var(--border); border-left: 3px solid var(--green);
    padding: 0.9rem 1.1rem; border-radius: 6px; font-weight: 500; font-size: 1rem;
  }
  .chip {
    display: inline-block; background: #eef8e6; border: 1px solid #d3ecc2; color: #2d5a1a;
    font-size: 0.75rem; padding: 0.15rem 0.55rem; border-radius: 6px;
    margin: 0 0.35rem 0.35rem 0;
  }
  .evidence-chip {
    display: inline-block; background: #f2f2f2; border: 1px solid #ddd; color: #555;
    font-size: 0.72rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    padding: 0.12rem 0.5rem; border-radius: 5px; margin: 0.2rem 0.35rem 0 0;
  }
  .ground-row {
    border-bottom: 1px solid var(--border); padding: 0.6rem 0; font-size: 0.92rem;
  }
  .ground-row:last-child { border-bottom: none; }
  .role-badge {
    display: inline-block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.02em; padding: 0.1rem 0.45rem; border-radius: 5px; margin-right: 0.5rem;
    background: #e5eefc; color: #1a4c8f;
  }
  .ungrounded-row {
    border-bottom: 1px solid var(--border); padding: 0.6rem 0; font-size: 0.92rem; color: #96700f;
  }
  .ungrounded-row:last-child { border-bottom: none; }
  details.ground-details { margin-top: 0.5rem; }
  details.ground-details summary {
    cursor: pointer; color: var(--green-dark); font-weight: 650; font-size: 0.85rem;
    padding: 0.5rem 0; list-style: none;
  }
  details.ground-details summary::-webkit-details-marker { display: none; }
  details.ground-details summary::before { content: "▸ "; }
  details.ground-details[open] summary::before { content: "▾ "; }
  .badge {
    display: inline-block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.02em; padding: 0.12rem 0.5rem; border-radius: 5px; margin-right: 0.4rem;
  }
  .badge-high, .badge-severe { background: #fde2e2; color: #a12626; }
  .badge-medium, .badge-moderate { background: #fef3d8; color: #96700f; }
  .badge-low { background: #e7f3e2; color: #366321; }
  ul { margin: 0.25rem 0; padding-left: 1.3rem; font-size: 0.92rem; }
  li { margin-bottom: 0.25rem; }
  .finding, .risk, .opp, .rec, .method, .node-row {
    border-bottom: 1px solid var(--border); padding: 0.7rem 0; font-size: 0.92rem;
  }
  .finding:last-child, .risk:last-child, .opp:last-child, .rec:last-child,
  .method:last-child, .node-row:last-child { border-bottom: none; }
  .rec-title { font-weight: 650; color: #191919; }
  .fig-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.2rem; margin-top: 1rem;
  }
  .fig-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .fig-card img { width: 100%; display: block; background: #fff; }
  .fig-caption { padding: 0.7rem 0.9rem; font-size: 0.85rem; color: #555; }
  .edge-arrow { color: var(--green-dark); font-weight: 700; }
  .muted { color: #888; font-size: 0.85rem; }
  #status, #error { max-width: 860px; margin: 4rem auto; text-align: center; color: #777; }
  #error { color: #a12626; }
  .stat-row { display: flex; flex-wrap: wrap; gap: 1.5rem; font-size: 0.85rem; color: #666; margin-top: 0.3rem; }

  /* ---------------- Delphi Research Engine (web-only chat) ---------------- */
  #researchBot { position: fixed; right: 22px; bottom: 22px; z-index: 60; }
  .re-launcher {
    display: flex; align-items: center; gap: 11px; padding: 11px 16px 11px 13px;
    background: #fff; border: 1px solid var(--border); border-radius: 999px;
    box-shadow: 0 14px 34px -14px rgba(0,0,0,0.28); cursor: pointer;
    transition: transform 0.15s ease;
  }
  .re-launcher:hover { transform: translateY(-2px); }
  .re-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 0 4px rgba(120,214,75,0.18); flex-shrink: 0; }
  .re-launcher-text { display: flex; flex-direction: column; line-height: 1.25; text-align: left; }
  .re-launcher-title { font-size: 13.5px; font-weight: 700; color: #191919; }
  .re-launcher-sub { font-size: 11.5px; color: #888; }

  #researchBot.re-collapsed .re-panel { display: none; }
  #researchBot.re-open .re-launcher { display: none; }

  .re-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 380px; max-width: 100vw;
    display: flex; flex-direction: column;
    background: #fff; border-left: 1px solid var(--border);
    box-shadow: -18px 0 44px -24px rgba(0,0,0,0.3);
  }
  .re-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 17px; border-bottom: 1px solid var(--border); background: #fafafa;
  }
  .re-header-titles { display: flex; flex-direction: column; line-height: 1.3; }
  .re-title { font-size: 14.5px; font-weight: 700; color: #191919; }
  .re-subtitle { font-size: 11.5px; color: #888; }
  .re-icon-btn {
    width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
    background: #fff; color: var(--grey); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .re-icon-btn:hover { background: #eef8e6; color: var(--green-dark); }

  .re-messages { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 11px; }
  .re-msg { font-size: 13px; line-height: 1.55; padding: 10px 13px; border-radius: 12px; max-width: 90%; }
  .re-msg-user { align-self: flex-end; background: var(--green); color: #14320a; border-bottom-right-radius: 4px; }
  .re-msg-bot { align-self: flex-start; background: #f4faef; color: #232823; border: 1px solid var(--border); border-bottom-left-radius: 4px; white-space: pre-wrap; }
  .re-typing { align-self: flex-start; color: #999; font-size: 12.5px; font-style: italic; }

  .re-input-row { display: flex; align-items: center; gap: 8px; padding: 12px 13px; border-top: 1px solid var(--border); }
  .re-input {
    flex: 1; height: 40px; padding: 0 14px; border: 1px solid var(--border);
    border-radius: 999px; font-size: 13px; color: #232823; background: #fafafa; outline: none;
  }
  .re-input:focus { border-color: var(--green); background: #fff; }
  .re-send {
    width: 40px; height: 40px; flex-shrink: 0; border: none; border-radius: 50%;
    background: var(--green); color: #16330b; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .re-send:hover { background: var(--green-dark); color: #fff; }
  .re-send:disabled { opacity: 0.5; cursor: default; }

  /* Expert feedback section */
  .re-feedback { border-top: 1px solid var(--border); background: #fafafa; padding: 12px 15px 15px; }
  .re-fb-toggle {
    display: flex; align-items: center; justify-content: space-between; width: 100%;
    background: none; border: none; padding: 4px 0; cursor: pointer;
    font-size: 12.5px; font-weight: 700; color: var(--grey); letter-spacing: 0.02em;
  }
  .re-fb-toggle:hover { color: var(--green-dark); }
  .re-fb-body { display: none; margin-top: 10px; }
  .re-feedback.re-fb-open .re-fb-body { display: block; }
  .re-fb-note { font-size: 11.5px; color: #999; margin: 0 0 8px; }
  .re-fb-lock-row { display: flex; flex-direction: column; gap: 7px; margin-bottom: 8px; }
  .re-fb-field {
    width: 100%; height: 36px; padding: 0 12px; border: 1px solid var(--border);
    border-radius: 7px; font-size: 12.5px; background: #fff; outline: none; color: #232823;
    box-sizing: border-box;
  }
  .re-fb-field:focus { border-color: var(--green); }
  .re-fb-unlock { width: 100%; }
  .re-fb-unlock, .re-fb-submit {
    height: 36px; padding: 0 14px; border: none; border-radius: 7px;
    background: var(--green); color: #16330b; font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
  .re-fb-unlock:hover, .re-fb-submit:hover { background: var(--green-dark); color: #fff; }
  .re-fb-text {
    width: 100%; min-height: 76px; resize: vertical; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px; font: inherit; font-size: 12.5px;
    color: #232823; background: #fff; outline: none; box-sizing: border-box;
  }
  .re-fb-text:disabled { background: #f0f0f0; color: #aaa; cursor: not-allowed; }
  .re-fb-text:focus { border-color: var(--green); }
  .re-fb-submit-row { display: flex; justify-content: flex-end; margin-top: 8px; }
  .re-fb-status { font-size: 11.5px; margin-top: 7px; }
  .re-fb-status.ok { color: var(--green-dark); }
  .re-fb-status.err { color: #a12626; }

  .re-hide { border: none; background: transparent; padding: 4px 12px 12px; font-size: 12px; color: #999; cursor: pointer; text-align: center; }
  .re-hide:hover { color: var(--grey); text-decoration: underline; }

  @media (max-width: 900px) { #researchBot { display: none; } }
</style>
</head>
<body>

<div id="status">Loading report…</div>
<div id="error" style="display:none"></div>

<main id="report" style="display:none">
  <a class="back" href="index.html">&larr; Back to feed</a>
  <div id="content"></div>
</main>

<!-- Delphi Research Engine — web-only chat about THIS insight + expert feedback -->
<div id="researchBot" class="re-collapsed" style="display:none">
  <button type="button" id="reLauncher" class="re-launcher" aria-label="Open Delphi Research Engine">
    <span class="re-dot" aria-hidden="true"></span>
    <span class="re-launcher-text">
      <span class="re-launcher-title">Delphi Research Engine</span>
      <span class="re-launcher-sub">Ask about this insight</span>
    </span>
  </button>

  <section class="re-panel" role="dialog" aria-label="Delphi Research Engine">
    <header class="re-header">
      <div class="re-header-titles">
        <span class="re-title">Delphi Research Engine</span>
        <span class="re-subtitle">Grounded in this report</span>
      </div>
      <button type="button" id="reMinimize" class="re-icon-btn" aria-label="Minimize">
        <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </header>

    <div id="reMessages" class="re-messages"></div>

    <form id="reForm" class="re-input-row" autocomplete="off">
      <input id="reInput" class="re-input" type="text" placeholder="Ask about this insight…" aria-label="Message" />
      <button type="submit" id="reSend" class="re-send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>

    <div id="reFeedback" class="re-feedback">
      <button type="button" id="reFbToggle" class="re-fb-toggle">
        <span>Expert feedback</span>
        <span aria-hidden="true">+</span>
      </button>
      <div class="re-fb-body">
        <p class="re-fb-note">Feedback is restricted to authorized subject-matter experts.</p>
        <div id="reFbLock" class="re-fb-lock-row">
          <input id="reFbUser" class="re-fb-field" type="text" placeholder="Username" aria-label="Username" autocomplete="off" />
          <input id="reFbPass" class="re-fb-field" type="password" placeholder="Password" aria-label="Password" autocomplete="off" />
          <button type="button" id="reFbUnlock" class="re-fb-unlock">Unlock</button>
        </div>
        <textarea id="reFbText" class="re-fb-text" placeholder="Expert access required to write feedback." disabled></textarea>
        <div class="re-fb-submit-row">
          <button type="button" id="reFbSubmit" class="re-fb-submit" disabled>Submit feedback</button>
        </div>
        <div id="reFbStatus" class="re-fb-status"></div>
      </div>
    </div>

    <button type="button" id="reHide" class="re-hide">Hide assistant</button>
  </section>
</div>

<script>
const INSIGHT_API = "http://127.0.0.1:8300";

function esc(value) {
  const div = document.createElement("div");
  div.textContent = value === null || value === undefined ? "" : String(value);
  return div.innerHTML;
}

function list(items, mapFn) {
  if (!items || !items.length) return "<p class=\"muted\">None recorded.</p>";
  return `<ul>${items.map((i) => `<li>${esc(mapFn ? mapFn(i) : i)}</li>`).join("")}</ul>`;
}

function chips(items) {
  if (!items || !items.length) return "<p class=\"muted\">None recorded.</p>";
  return items.map((i) => `<span class="chip">${esc(i)}</span>`).join("");
}

function severityBadge(level) {
  const cls = { high: "badge-high", severe: "badge-severe", medium: "badge-medium",
                moderate: "badge-moderate", low: "badge-low" }[(level || "").toLowerCase()] || "badge-medium";
  return `<span class="badge ${cls}">${esc(level || "unknown")}</span>`;
}

function statSummary(m) {
  const parts = [];
  if (m.statistic !== null && m.statistic !== undefined) parts.push(`statistic: ${Number(m.statistic).toFixed(3)}`);
  if (m.p_value !== null && m.p_value !== undefined) parts.push(`p = ${Number(m.p_value).toFixed(4)}`);
  if (m.effect_size !== null && m.effect_size !== undefined) parts.push(`effect size: ${Number(m.effect_size).toFixed(3)}`);
  return parts.join(" &middot; ");
}

function evidenceChips(refs) {
  if (!refs || !refs.length) return `<span class="muted">no cited evidence</span>`;
  return refs.map((r) => `<span class="evidence-chip">${esc(r)}</span>`).join("");
}

function groundedRowHtml(g) {
  return `<div class="ground-row">
    <span class="role-badge">${esc(g.role)}</span><strong>${esc(g.construct_name)}</strong>
    <div>${chips(g.columns)}</div>
    ${g.rationale ? `<p class="muted">${esc(g.rationale)}</p>` : ""}
  </div>`;
}

function renderReport(pkg) {
  const hp = pkg.hypothesis_package;
  const narrative = pkg.narrative || {};
  const plan = pkg.investigation_plan || {};
  const analytics = pkg.analytics_results || { methods_run: [] };
  const rootCause = pkg.root_cause_graph || { nodes: [], edges: [] };
  const insights = pkg.business_insights || {};
  const figures = pkg.generated_figures || [];
  const grounding = pkg.grounding_map || { grounded: [], ungrounded: [], outcome_columns_available: [] };
  const vizSpecs = (pkg.visualization_plan && pkg.visualization_plan.specs) || [];

  document.title = `${hp.headline || hp.hypothesis_statement.slice(0, 60)} — Delphi Insight Report`;

  // Charts are placed inline next to the analytics finding that produced
  // them (matched via shared variables) rather than dumped in one block at
  // the end — easier to read a number next to the picture that shows it.
  const specsById = {};
  vizSpecs.forEach((s) => { specsById[s.id] = s; });
  const usedFigureIds = new Set();

  function figureCard(f) {
    return `<div class="fig-card">
      <img src="${esc(f.file_ref)}" alt="${esc(f.alt_text || f.caption || "")}" loading="lazy" />
      <div class="fig-caption">${esc(f.caption || "")}</div>
    </div>`;
  }

  function figuresGrid(figs) {
    return figs.length ? `<div class="fig-grid">${figs.map(figureCard).join("")}</div>` : "";
  }

  function figuresForVariables(vars) {
    if (!vars || !vars.length) return [];
    const varSet = new Set(vars);
    return figures.filter((f) => {
      if (usedFigureIds.has(f.id)) return false;
      const spec = specsById[f.spec_id];
      const overlap = spec && spec.variables && spec.variables.some((v) => varSet.has(v));
      if (overlap) usedFigureIds.add(f.id);
      return overlap;
    });
  }

  const analyticsHtml = analytics.methods_run.length ? analytics.methods_run.map((m) => `
      <div class="method">
        <div><strong>${esc(m.method)}</strong></div>
        <div class="stat-row">${statSummary(m)}</div>
        <p>${esc(m.interpretation_notes || "")}</p>
        ${m.caveats && m.caveats.length ? `<p class="muted">Caveats: ${m.caveats.map(esc).join("; ")}</p>` : ""}
        ${figuresGrid(figuresForVariables(m.variables_involved))}
      </div>`).join("") : `<p class="muted">No statistical methods produced results (often because the requested
      variables don't map to actual columns in the underlying dataset — see Data quality notes).</p>`;

  // Anything left unmatched (e.g. a chart whose spec variables didn't line
  // up 1:1 with a single method) still gets shown, just grouped here instead
  // of silently dropped.
  const leftoverFigures = figures.filter((f) => !usedFigureIds.has(f.id));
  const leftoverFiguresHtml = leftoverFigures.length
    ? `<h3>Additional charts</h3>${figuresGrid(leftoverFigures)}`
    : "";

  const groundingHtml = `
    <h2>SHL grounding map</h2>
    <p class="muted">Every construct above was analyzed using only real assessment/outcome columns present in
      the organization's data — nothing on this page is an invented metric. Shown last, for reference on what
      was actually used.</p>
    ${(grounding.grounded || []).length ? `
      ${groundedRowHtml(grounding.grounded[0])}
      ${grounding.grounded.length > 1 ? `
        <details class="ground-details">
          <summary>Show ${grounding.grounded.length - 1} more grounded construct${grounding.grounded.length - 1 === 1 ? "" : "s"}</summary>
          ${grounding.grounded.slice(1).map(groundedRowHtml).join("")}
        </details>` : ""}
    ` : `<p class="muted">No constructs were grounded.</p>`}
    ${(grounding.ungrounded || []).length || (grounding.outcome_columns_available || []).length ? `
      <details class="ground-details">
        <summary>Show ungrounded constructs &amp; available outcome columns</summary>
        ${(grounding.ungrounded || []).length ? `
          <h3>Constructs without a measurable SHL proxy</h3>
          ${grounding.ungrounded.map((u) => `
            <div class="ungrounded-row">
              <strong>${esc(u.construct_name)}</strong> &mdash; ${esc(u.reason)}
            </div>`).join("")}` : ""}
        ${(grounding.outcome_columns_available || []).length ? `
          <h3>Outcome columns available</h3>
          <div>${chips(grounding.outcome_columns_available)}</div>` : ""}
      </details>` : ""}
  `;

  document.getElementById("content").innerHTML = `
    <div class="lens-tag">${esc(hp.business_lens)}</div>
    <h1>${esc(hp.headline || hp.hypothesis_statement)}</h1>
    <p class="subtitle">${esc(narrative.executive_summary || hp.summary || "")}</p>
    <div class="meta">
      Organization: ${esc(hp.organization_id || "unknown")} &middot;
      Investigated: ${esc(new Date(pkg.generated_at).toLocaleString())}
    </div>

    <h2>The hypothesis</h2>
    <p class="statement">${esc(hp.hypothesis_statement)}</p>
    <h3>Hidden mechanism</h3>
    <p>${esc(hp.mechanism_explanation)}</p>
    <h3>Target constructs</h3>
    <div>${chips(hp.target_constructs)}</div>

    <h2>Executive narrative</h2>
    <div class="card">
      <p>${esc(narrative.business_narrative || "")}</p>
    </div>
    <h3>Key messages</h3>
    ${list(narrative.key_messages)}
    <h3>Storyline</h3>
    ${list(narrative.storyline)}
    <h3>Contradictions / open questions</h3>
    ${list(narrative.contradictions)}
    ${list(narrative.future_questions)}

    <h2>Investigation plan</h2>
    <p>${esc(plan.target_population ? plan.target_population.description : "")}</p>
    <h3>Statistical questions</h3>
    ${list(plan.statistical_questions)}
    <h3>Business questions</h3>
    ${list(plan.business_questions)}
    <h3>Validation strategy</h3>
    <p>${esc(plan.validation_strategy || "")}</p>

    <h2>Analytics results</h2>
    ${analyticsHtml}
    ${leftoverFiguresHtml}
    <h3>Data quality notes</h3>
    ${list(analytics.data_quality_notes)}

    <h2>Root cause analysis</h2>
    <p class="muted">Confidence: ${((rootCause.confidence || 0) * 100).toFixed(0)}%</p>
    ${(rootCause.edges || []).length ? (rootCause.edges || []).map((e) => `
      <div class="node-row">
        <strong>${esc(e.source)}</strong> <span class="edge-arrow">&rarr; ${esc(e.relationship_type)} &rarr;</span> <strong>${esc(e.target)}</strong>
        <span class="muted"> (strength ${Number(e.strength).toFixed(2)}, confidence ${Number(e.confidence).toFixed(2)})</span>
        <div>${evidenceChips(e.evidence_refs)}</div>
      </div>`).join("") : `<p class="muted">No causal edges identified (every proposed edge lacked grounded evidence and was dropped).</p>`}
    <h3>Potential mechanisms</h3>
    ${list(rootCause.potential_mechanisms)}
    <h3>Alternative explanations</h3>
    ${list(rootCause.alternative_explanations)}

    <h2>Business insights</h2>
    <h3>Findings</h3>
    ${(insights.findings || []).length ? insights.findings.map((f) => `
      <div class="finding">${esc(f.statement)} <span class="muted">(confidence ${((f.confidence || 0) * 100).toFixed(0)}%)</span>
      <div>${evidenceChips(f.evidence_refs)}</div></div>`).join("")
      : `<p class="muted">None recorded.</p>`}
    <h3>Risks</h3>
    ${(insights.risks || []).length ? insights.risks.map((r) => `
      <div class="risk">${severityBadge(r.severity)}${esc(r.description)}
      <div class="muted">Likelihood: ${esc(r.likelihood)} &middot; Affects: ${esc(r.affected_population)}</div></div>`).join("")
      : `<p class="muted">None recorded.</p>`}
    <h3>Opportunities</h3>
    ${(insights.opportunities || []).length ? insights.opportunities.map((o) => `
      <div class="opp">${esc(o.description)}
      <div class="muted">Potential value: ${esc(o.potential_value)} &middot; Feasibility: ${esc(o.feasibility)}</div></div>`).join("")
      : `<p class="muted">None recorded.</p>`}
    <h3>Strategic recommendations</h3>
    ${(insights.strategic_recommendations || []).length ? insights.strategic_recommendations
      .slice().sort((a, b) => (a.priority || 99) - (b.priority || 99)).map((r) => `
      <div class="rec"><span class="rec-title">#${esc(r.priority)} &mdash; ${esc(r.action)}</span>
      <p>${esc(r.rationale)}</p>
      <div class="muted">Expected ROI: ${esc(r.expected_roi)} &middot; Owner: ${esc(r.owner_suggestion)}</div></div>`).join("")
      : `<p class="muted">None recorded.</p>`}

    <h3>Financial impact</h3>
    <p>${esc(insights.financial_impact || "")}</p>
    <h3>Organizational impact</h3>
    <p>${esc(insights.organizational_impact || "")}</p>
    <h3>Employee impact</h3>
    <p>${esc(insights.employee_impact || "")}</p>

    ${groundingHtml}
  `;
}

async function main() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const statusEl = document.getElementById("status");
  const errorEl = document.getElementById("error");
  if (!id) {
    statusEl.style.display = "none";
    errorEl.style.display = "block";
    errorEl.textContent = "No report id given (expected ?id=... in the URL).";
    return;
  }
  try {
    const res = await fetch(`${INSIGHT_API}/api/insights/${encodeURIComponent(id)}`, { cache: "no-store" });
    if (!res.ok) throw new Error(res.status === 404 ? "Report not found." : `API returned ${res.status}`);
    const pkg = await res.json();
    renderReport(pkg);
    statusEl.style.display = "none";
    document.getElementById("report").style.display = "block";
    initResearchBot(id);
  } catch (e) {
    statusEl.style.display = "none";
    errorEl.style.display = "block";
    errorEl.textContent = `Couldn't load this report: ${e.message}. Is the Investigation Pipeline API (port 8300) running?`;
  }
}

// ---------------------------------------------------------
// Delphi Research Engine — web-only chat about THIS insight + expert feedback.
// ---------------------------------------------------------
function initResearchBot(insightId) {
  const root = document.getElementById("researchBot");
  if (!root || !insightId) return;
  root.style.display = "";

  const $ = (id) => document.getElementById(id);
  const messagesEl = $("reMessages");
  const input = $("reInput");
  const sendBtn = $("reSend");
  const history = [];
  let greeted = false;
  let authed = false;

  function addMsg(role, text) {
    const el = document.createElement("div");
    el.className = `re-msg re-msg-${role}`;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }
  function greet() {
    if (greeted) return;
    greeted = true;
    addMsg("bot", "Ask me anything about this insight — its findings, the analytics behind it, the SHL metrics, or what to do next.");
  }
  function open() {
    root.classList.remove("re-collapsed");
    root.classList.add("re-open");
    greet();
    setTimeout(() => input && input.focus(), 60);
  }
  function collapse() {
    root.classList.remove("re-open");
    root.classList.add("re-collapsed");
  }

  async function ask(message) {
    addMsg("user", message);
    history.push({ role: "user", content: message });
    sendBtn.disabled = true;
    const typing = addMsg("bot", "Thinking…");
    typing.classList.add("re-typing");
    try {
      const res = await fetch(`${INSIGHT_API}/api/insights/${encodeURIComponent(insightId)}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history: history.slice(0, -1) }),
      });
      const data = res.ok ? await res.json() : { reply: "Sorry, something went wrong.", available: false };
      typing.classList.remove("re-typing");
      typing.textContent = data.reply || "(no response)";
      if (data.available) history.push({ role: "assistant", content: data.reply });
    } catch (e) {
      typing.classList.remove("re-typing");
      typing.textContent = "The research assistant is unreachable. Is the pipeline API (port 8300) running?";
    } finally {
      sendBtn.disabled = false;
    }
  }

  $("reLauncher").addEventListener("click", open);
  $("reMinimize").addEventListener("click", collapse);
  $("reHide").addEventListener("click", collapse);
  $("reForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;
    input.value = "";
    ask(q);
  });

  // --- Expert feedback gate (server-side credential check) ---
  const fb = $("reFeedback");
  const fbUser = $("reFbUser");
  const fbPass = $("reFbPass");
  const fbText = $("reFbText");
  const fbSubmit = $("reFbSubmit");
  const fbStatus = $("reFbStatus");

  function setStatus(msg, kind) {
    fbStatus.textContent = msg || "";
    fbStatus.className = "re-fb-status" + (kind ? " " + kind : "");
  }

  $("reFbToggle").addEventListener("click", () => fb.classList.toggle("re-fb-open"));

  // Pressing Enter in either credential field triggers Unlock.
  [fbUser, fbPass].forEach((el) => el.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); $("reFbUnlock").click(); }
  }));

  $("reFbUnlock").addEventListener("click", async () => {
    const username = fbUser.value.trim();
    const password = fbPass.value;
    if (!username || !password) { setStatus("Enter username and password.", "err"); return; }
    try {
      const res = await fetch(`${INSIGHT_API}/api/expert/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (data.ok) {
        authed = true;
        fbText.disabled = false;
        fbSubmit.disabled = false;
        fbText.placeholder = "Enter expert feedback on this insight…";
        setStatus("Expert access granted.", "ok");
      } else {
        authed = false;
        fbText.disabled = true;
        fbSubmit.disabled = true;
        setStatus("Invalid credentials. Access denied.", "err");
      }
    } catch (e) {
      setStatus("Could not reach the server.", "err");
    }
  });

  fbSubmit.addEventListener("click", async () => {
    if (!authed) return;
    const feedback = fbText.value.trim();
    if (!feedback) { setStatus("Feedback is empty.", "err"); return; }
    fbSubmit.disabled = true;
    try {
      const res = await fetch(`${INSIGHT_API}/api/insights/${encodeURIComponent(insightId)}/feedback`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: fbUser.value.trim(), password: fbPass.value, feedback }),
      });
      if (res.ok) {
        fbText.value = "";
        setStatus("Feedback submitted. Thank you.", "ok");
      } else {
        setStatus(res.status === 401 ? "Session expired — unlock again." : "Submission failed.", "err");
      }
    } catch (e) {
      setStatus("Could not reach the server.", "err");
    } finally {
      fbSubmit.disabled = false;
    }
  });
}

main();
</script>
