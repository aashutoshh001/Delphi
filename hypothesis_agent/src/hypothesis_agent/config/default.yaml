search:
  max_iterations: 8
  convergence_window: 3
  convergence_epsilon: 0.02
  exploration_floor: 0.15
  mutation_probability: 0.2
  discard_threshold: 0.35
  duplicate_similarity_threshold: 0.93

scoring:
  weights:
    business_value: 0.16
    novelty: 0.14
    depth: 0.12
    actionability: 0.12
    strategic_importance: 0.10
    feasibility: 0.08
    organizational_impact: 0.10
    expected_insight: 0.08
    confidence: 0.06
    future_extensibility: 0.04

feedback:
  min_multiplier: 0.7
  max_multiplier: 1.3
  smoothing: 3.0

backends:
  llm: mock
  embedding: hash
  understanding_engine: direct_llm
  critics: ["checklist"]
  organization_repository: in_memory
  employee_repository: in_memory
  historical_memory_repository: in_memory
  feedback_repository: in_memory
  analysis_agent_gateway: noop
  json_store_path: "sample_data/stories.json"

llm:
  # Cheapest general-purpose OpenAI-compatible model — this project is at
  # the testing stage, so cost-per-call matters more than quality. Bump this
  # once you're past testing.
  model: gpt-4.1-nano
  temperature: 0.5

embedding:
  model: text-embedding-3-small
  dimensions: 256

logging:
  level: INFO
  structured: true
